{% extends 'base.html' %}

{% block content %}
<section class="card narrow">
  <h2>Daily check-in</h2>
  <p><strong>Experiment:</strong> {{ current.experiment.name }}</p>

  <form method="post" class="form">
    <label>How was your day for this goal? (1-10)
      <input type="number" name="score" min="1" max="10" required>
    </label>

    <fieldset>
      <legend>Did you follow the experiment today?</legend>
      <label class="choice"><input type="radio" name="followed" value="yes" required> <span>Yes</span></label>
      <label class="choice"><input type="radio" name="followed" value="no" required> <span>No</span></label>
    </fieldset>

    <label>Optional note
      <textarea name="note" rows="4" placeholder="What affected today?"></textarea>
    </label>

    <button type="submit">Save check-in</button>
  </form>
</section>
{% endblock %}
