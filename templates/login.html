{% extends 'base.html' %}

{% block content %}
<section class="card narrow">
  <h2>Log in</h2>
  <form method="post" class="form">
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
</section>
{% endblock %}
